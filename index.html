<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Whose Impostor?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0f3e 50%, #0f2e5e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%), 
                        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
        }

        .content-narrow {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        h2 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #fff;
            text-align: center;
        }

        h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 12px 0;
        }

        .subtitle {
            font-size: 16px;
            color: #a0a0ff;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .card {
            background: rgba(30, 30, 80, 0.4);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #a0a0ff;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 20px;
            resize: none;
            box-sizing: border-box;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(99, 102, 241, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .rules {
            background: rgba(30, 30, 80, 0.3);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 20px;
            font-size: 13px;
            line-height: 1.6;
            color: #c0c0ff;
            max-height: 300px;
            overflow-y: auto;
        }

        .rules ul {
            margin: 0;
            padding-left: 20px;
        }

        .rules li {
            margin-bottom: 6px;
        }

        .phase-indicator {
            text-align: center;
            font-size: 13px;
            color: #a0a0ff;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .progress {
            font-size: 14px;
            color: #a0a0ff;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
        }

        .reveal-card {
            background: rgba(30, 30, 80, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 60px 40px;
            margin-bottom: 40px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .player-name {
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            color: #fff;
        }

        .hold-button {
            position: relative;
            padding: 16px 32px;
            background-color: rgba(99, 102, 241, 0.2);
            border: 2px solid rgba(99, 102, 241, 0.5);
            border-radius: 12px;
            color: #a0a0ff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            overflow: hidden;
            min-width: 150px;
            text-align: center;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .hold-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(99, 102, 241, 0.3);
            transition: width 0.016s linear;
            border-radius: 10px;
        }

        .hold-text {
            position: relative;
            z-index: 1;
        }

        .role-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        .role-badge {
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .gesture-hint {
            font-size: 13px;
            color: #a0a0ff;
            font-style: italic;
            text-align: center;
        }

        .discussion-box {
            background: rgba(30, 30, 80, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 40px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
        }

        .discussion-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .discussion-text {
            font-size: 16px;
            color: #a0a0ff;
            line-height: 1.6;
        }

        .elimination-phase-box {
            background: rgba(30, 30, 80, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 40px 30px;
            margin-bottom: 40px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .elimination-phase-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .elimination-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .player-select-btn {
            padding: 12px 16px;
            background-color: rgba(99, 102, 241, 0.2);
            border: 2px solid rgba(99, 102, 241, 0.5);
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
        }

        .player-select-btn.selected {
            background-color: #ff3d5c;
            border-color: #ff3d5c;
            transform: scale(1.05);
        }

        .player-select-btn:hover:not(.selected) {
            border-color: #8a94ff;
        }

        .voting-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #fff;
            text-align: center;
        }

        .voting-subtitle {
            font-size: 14px;
            color: #a0a0ff;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
        }

        .pass-phone {
            font-size: 16px;
            color: #a78bfa;
            text-align: center;
            padding: 20px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }

        .voting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
            width: 100%;
        }

        .vote-option {
            padding: 16px 12px;
            background-color: rgba(77, 127, 255, 0.2);
            border: 2px solid rgba(77, 127, 255, 0.5);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
        }

        .vote-option.selected {
            background-color: #4d7fff;
            border-color: #4d7fff;
            transform: scale(1.05);
        }

        .vote-option:hover:not(.selected) {
            border-color: #6d9dff;
        }

        .voting-content,
        .results-content,
        .reveal-content,
        .discussion-content,
        .elimination-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
        }

        .results-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 30px 0;
            text-align: center;
            color: #fff;
        }

        .vote-results {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(30, 30, 80, 0.3);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
        }

        .vote-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        }

        .vote-count {
            color: #ff3d5c;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .elimination-box {
            background: rgba(30, 30, 80, 0.4);
            border: 2px solid;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
        }

        .elimination-text {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #fff;
        }

        .role-reveal {
            font-size: 14px;
            color: #a0a0ff;
            margin: 0;
        }

        .win-box {
            background: rgba(46, 204, 113, 0.15);
            border: 2px solid #2ecc71;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
        }

        .win-text {
            font-size: 24px;
            font-weight: 700;
            color: #2ecc71;
            margin-bottom: 10px;
        }

        .win-details {
            font-size: 14px;
            color: #a0a0ff;
        }

        .game-status {
            background: rgba(30, 30, 80, 0.3);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            width: 100%;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-item {
            font-size: 13px;
            padding: 8px;
            color: #a0a0ff;
            display: flex;
            justify-content: space-between;
        }

        .player-status {
            font-size: 12px;
            color: #ff3d5c;
        }

        .next-button {
            animation: fadeIn 0.4s ease-out 0.3s both;
        }

        .tie-box {
            background: rgba(255, 157, 77, 0.15);
            border: 2px solid #ff9d4d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
        }

        .tie-text {
            font-size: 20px;
            font-weight: 700;
            color: #ff9d4d;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 36px;
            }

            h2 {
                font-size: 28px;
            }

            .reveal-card, .elimination-phase-box, .discussion-box {
                padding: 40px 20px;
            }

            .player-name {
                font-size: 28px;
            }

            .role-badge {
                font-size: 20px;
                padding: 16px 32px;
            }

            .card {
                padding: 20px;
            }

            .voting-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .elimination-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            button {
                font-size: 15px;
                padding: 12px 16px;
            }
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const GESTURES = ['Wink', 'Double Blink', 'Tap Shoulder', 'Wave Hand'];

        const roleColors = {
            Impostor: '#ff3d5c',
            Detective: '#4d7fff',
            Crewmate: '#2ecc71'
        };

        let state = {
            screen: 'setup',
            phase: null, // setup, reveal, discussion, elimination, voting, results, gameover
            players: [],
            currentPlayerIndex: 0,
            holdProgress: 0,
            revealed: false,
            votingPhase: null,
            votes: {},
            selectedVote: null,
            selectedElimination: null,
            eliminationGesture: null,
            gameLog: [],
            roundNumber: 1
        };

        let holdInterval = null;

        function generateRoles(numPlayers) {
            const roles = ['Impostor', 'Detective'];
            for (let i = 2; i < numPlayers; i++) {
                roles.push('Crewmate');
            }
            return roles.sort(() => Math.random() - 0.5);
        }

        function render() {
            const app = document.getElementById('app');
            
            if (state.phase === 'setup') {
                renderSetup(app);
            } else if (state.phase === 'reveal') {
                renderReveal(app);
            } else if (state.phase === 'discussion') {
                renderDiscussion(app);
            } else if (state.phase === 'elimination') {
                renderElimination(app);
            } else if (state.phase === 'voting') {
                renderVoting(app);
            } else if (state.phase === 'results') {
                renderResults(app);
            } else if (state.phase === 'gameover') {
                renderGameOver(app);
            }
        }

        function renderSetup(app) {
            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="content">
                        <h1>Whose Impostor?</h1>
                        <p class="subtitle">A game of deception and deduction</p>
                        
                        <div class="card">
                            <label>Enter player names (one per line):</label>
                            <textarea id="playerNames" placeholder="Alice&#10;Bob&#10;Charlie&#10;Diana&#10;Eva"></textarea>
                            <button onclick="startGame()">Start Game</button>
                        </div>

                        <div class="rules">
                            <h3>How to Play</h3>
                            <ul>
                                <li>One player is the <strong>Impostor</strong></li>
                                <li>One player is the <strong>Detective</strong></li>
                                <li>Others are <strong>Crewmates</strong></li>
                                <li>Discuss who might be the Impostor</li>
                                <li>Impostor secretly eliminates a player using a gesture</li>
                                <li>Everyone votes to eliminate a suspect</li>
                            </ul>
                            <h3 style="margin-top: 16px;">Win Conditions</h3>
                            <ul>
                                <li><strong>Crewmates win:</strong> Vote out the Impostor, OR Impostor eliminates Detective</li>
                                <li><strong>Impostor wins:</strong> Only Impostor & Detective remain, OR all Crewmates eliminated</li>
                            </ul>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderReveal(app) {
            const currentPlayer = state.players[state.currentPlayerIndex];
            const progress = Math.min(state.holdProgress / 1000, 1);

            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="reveal-content">
                        <div class="phase-indicator">ROLE REVEAL</div>
                        <div class="progress">${state.currentPlayerIndex + 1} / ${state.players.length}</div>

                        <div class="reveal-card">
                            <h2 class="player-name">${currentPlayer.name}</h2>
                            
                            <div class="hold-button" id="holdBtn" onmousedown="handleHoldStart()" onmouseup="handleHoldEnd()" onmouseleave="handleHoldEnd()" ontouchstart="handleHoldStart()" ontouchend="handleHoldEnd()" style="opacity: ${state.revealed ? 0 : 1}; pointer-events: ${state.revealed ? 'none' : 'auto'};">
                                <div class="hold-progress" style="width: ${progress * 100}%"></div>
                                <span class="hold-text">Hold to Reveal</span>
                            </div>

                            ${state.revealed ? `
                                <div class="role-display">
                                    <div class="role-badge" style="background-color: ${roleColors[currentPlayer.role]};">
                                        ${currentPlayer.role}
                                    </div>
                                    ${currentPlayer.role === 'Impostor' ? `
                                        <div class="gesture-hint">
                                            Elimination gesture: <strong>${state.eliminationGesture}</strong>
                                        </div>
                                    ` : ''}
                                </div>
                            ` : ''}
                        </div>

                        ${state.revealed ? `
                            <button class="next-button" onclick="nextPlayer()">Hide Role & Next Player</button>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderDiscussion(app) {
            const alivePlayers = state.players.filter(p => p.alive);

            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="discussion-content">
                        <div class="phase-indicator">DISCUSSION PHASE</div>

                        <div class="discussion-box">
                            <h2 class="discussion-title">Discuss & Suspect</h2>
                            <p class="discussion-text">Talk with each other. Who do you think is the Impostor?</p>
                            <p class="discussion-text" style="margin-top: 20px; font-size: 14px; color: #818cf8;">
                                After discussion, the Impostor will eliminate someone using the secret gesture.
                            </p>
                        </div>

                        <div class="game-status">
                            <h3>Active Players (${alivePlayers.length})</h3>
                            <div class="player-list">
                                ${alivePlayers.map(p => `
                                    <div class="player-item">${p.name}</div>
                                `).join('')}
                            </div>
                        </div>

                        <button onclick="goToElimination()">Impostor Eliminate Someone</button>
                    </div>
                </div>
            `;
        }

        function renderElimination(app) {
            const alivePlayers = state.players.filter(p => p.alive);

            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="elimination-content">
                        <div class="phase-indicator">ELIMINATION PHASE</div>

                        <div class="elimination-phase-box">
                            <div class="elimination-phase-title">Impostor: Select Target</div>
                            <p style="text-align: center; color: #a0a0ff; font-size: 14px; margin-bottom: 20px;">
                                Use the gesture: <strong>${state.eliminationGesture}</strong> on one player.
                            </p>
                            <p style="text-align: center; color: #a0a0ff; font-size: 14px; margin-bottom: 20px;">
                                Then select who you eliminated:
                            </p>

                            <div class="elimination-grid">
                                ${alivePlayers.map(player => `
                                    <button class="player-select-btn ${state.selectedElimination === player.id ? 'selected' : ''}" onclick="selectElimination(${player.id})">
                                        ${player.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <button onclick="confirmElimination()" ${state.selectedElimination === null ? 'disabled' : ''}>Confirm Elimination</button>
                    </div>
                </div>
            `;
        }

        function renderVoting(app) {
            const currentVoter = state.players[state.currentPlayerIndex];
            const alivePlayers = state.players.filter(p => p.alive);

            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="voting-content">
                        <div class="phase-indicator">VOTING PHASE</div>
                        <h2 class="voting-title">Who is the Impostor?</h2>
                        <p class="voting-subtitle">${currentVoter.name}'s vote</p>

                        <div class="voting-grid">
                            ${alivePlayers.map(player => `
                                <button class="vote-option ${state.selectedVote === player.id ? 'selected' : ''}" onclick="selectVote(${player.id})">
                                    ${player.name}
                                </button>
                            `).join('')}
                        </div>

                        <button onclick="submitVote()" ${state.selectedVote === null ? 'disabled' : ''}>
                            Submit Vote (${state.currentPlayerIndex + 1} / ${state.players.length})
                        </button>

                        <div class="pass-phone">
                            ↓ Pass the phone after voting ↓
                        </div>
                    </div>
                </div>
            `;
        }

        function renderResults(app) {
            const voteCounts = {};
            Object.values(state.votes).forEach(votedId => {
                voteCounts[votedId] = (voteCounts[votedId] || 0) + 1;
            });

            const maxVotes = Math.max(...Object.values(voteCounts));
            const playersWithMaxVotes = Object.entries(voteCounts)
                .filter(([_, count]) => count === maxVotes)
                .map(([id, _]) => parseInt(id));

            const isTie = playersWithMaxVotes.length > 1;
            const eliminatedId = isTie ? null : playersWithMaxVotes[0];
            const eliminatedPlayer = eliminatedId !== null ? state.players.find(p => p.id === eliminatedId) : null;

            let resultHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="results-content">
                        <div class="phase-indicator">VOTING RESULTS - ROUND ${state.roundNumber}</div>
                        <h2 class="results-title">Vote Count</h2>

                        <div class="vote-results">
                            ${Object.entries(voteCounts).map(([id, count]) => {
                                const player = state.players.find(p => p.id === parseInt(id));
                                return `
                                    <div class="vote-result">
                                        <span>${player.name}</span>
                                        <span class="vote-count">${'●'.repeat(count)}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
            `;

            if (isTie) {
                resultHTML += `
                    <div class="tie-box">
                        <div class="tie-text">Tie Vote - No Elimination</div>
                        <p style="color: #a0a0ff; font-size: 13px; margin: 0;">The group cannot agree. Continue to next round.</p>
                    </div>
                `;
            } else {
                resultHTML += `
                    <div class="elimination-box" style="border-color: ${eliminatedPlayer?.role === 'Impostor' ? '#2ecc71' : '#ff3d5c'};">
                        <p class="elimination-text">${eliminatedPlayer?.name} has been eliminated</p>
                        <p class="role-reveal">Role: <strong>${eliminatedPlayer?.role}</strong></p>
                    </div>
                `;
            }

            resultHTML += `
                    <div class="game-status">
                        <h3>Active Players</h3>
                        <div class="player-list">
                            ${state.players.filter(p => p.alive).map(p => `
                                <div class="player-item">${p.name}</div>
                            `).join('')}
                        </div>
                    </div>

                    <button onclick="nextRound()">Continue</button>
                    </div>
                </div>
            `;

            app.innerHTML = resultHTML;
        }

        function renderGameOver(app) {
            const crewmatesWon = state.gameLog[state.gameLog.length - 1]?.includes('Crewmates win');

            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="results-content">
                        <div class="win-box">
                            <div class="win-text">${crewmatesWon ? '🎉 Crewmates Win! 🎉' : '🎭 Impostor Wins! 🎭'}</div>
                            <div class="win-details">${state.gameLog[state.gameLog.length - 1]}</div>
                        </div>

                        <div class="game-status">
                            <h3>Final Roles</h3>
                            <div class="player-list">
                                ${state.players.map(p => `
                                    <div class="player-item" style="color: ${p.alive ? '#a0a0ff' : '#666'};">
                                        <span>${p.name} - ${p.role}</span>
                                        <span class="player-status">${!p.alive ? 'Eliminated' : 'Alive'}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <button onclick="resetGame()">Play Again</button>
                    </div>
                </div>
            `;
        }

        function startGame() {
            const textarea = document.getElementById('playerNames');
            const names = textarea.value
                .split('\n')
                .map(n => n.trim())
                .filter(n => n.length > 0);
            
            if (names.length < 3) {
                alert('Need at least 3 players');
                return;
            }

            const gesture = GESTURES[Math.floor(Math.random() * GESTURES.length)];
            state.eliminationGesture = gesture;

            const roles = generateRoles(names.length);
            state.players = names.map((name, i) => ({
                id: i,
                name,
                role: roles[i],
                alive: true,
                eliminated: false
            }));

            state.phase = 'reveal';
            state.currentPlayerIndex = 0;
            state.revealed = false;
            state.holdProgress = 0;
            state.votes = {};
            state.selectedVote = null;
            state.selectedElimination = null;
            state.roundNumber = 1;

            render();
        }

        function handleHoldStart() {
            if (state.revealed) return;

            if (holdInterval) clearInterval(holdInterval);
            
            holdInterval = setInterval(() => {
                state.holdProgress += 16.67;
                if (state.holdProgress >= 1000) {
                    state.revealed = true;
                    clearInterval(holdInterval);
                    render();
                } else {
                    updateHoldProgress();
                }
            }, 16.67);
        }

        function handleHoldEnd() {
            if (holdInterval) clearInterval(holdInterval);
        }

        function updateHoldProgress() {
            const progress = document.querySelector('.hold-progress');
            if (progress) {
                progress.style.width = Math.min(state.holdProgress / 1000, 1) * 100 + '%';
            }
        }

        function nextPlayer() {
            if (state.currentPlayerIndex < state.players.length - 1) {
                state.currentPlayerIndex++;
                state.revealed = false;
                state.holdProgress = 0;
                render();
            } else {
                state.phase = 'discussion';
                state.currentPlayerIndex = 0;
                state.selectedVote = null;
                state.selectedElimination = null;
                render();
            }
        }

        function goToElimination() {
            state.phase = 'elimination';
            state.selectedElimination = null;
            render();
        }

        function selectElimination(playerId) {
            state.selectedElimination = playerId;
            render();
        }

        function confirmElimination() {
            if (state.selectedElimination === null) return;

            const eliminatedPlayer = state.players.find(p => p.id === state.selectedElimination);
            eliminatedPlayer.alive = false;
            eliminatedPlayer.eliminated = true;

            // Check if Detective was eliminated
            if (eliminatedPlayer.role === 'Detective') {
                state.gameLog.push('Crewmates win: Detective was eliminated by Impostor!');
                state.phase = 'gameover';
                render();
                return;
            }

            // Check win conditions
            const checkWin = checkWinConditions();
            if (checkWin) {
                state.phase = 'gameover';
                render();
                return;
            }

            state.phase = 'voting';
            state.currentPlayerIndex = 0;
            state.selectedVote = null;
            state.votes = {};
            render();
        }

        function selectVote(playerId) {
            state.selectedVote = playerId;
            render();
        }

        function submitVote() {
            if (state.selectedVote === null) return;
            
            state.votes[state.players[state.currentPlayerIndex].id] = state.selectedVote;

            if (state.currentPlayerIndex < state.players.length - 1) {
                state.currentPlayerIndex++;
                state.selectedVote = null;
                render();
            } else {
                processVotes();
                state.phase = 'results';
                render();
            }
        }

        function processVotes() {
            const voteCounts = {};
            Object.values(state.votes).forEach(votedId => {
                voteCounts[votedId] = (voteCounts[votedId] || 0) + 1;
            });

            const maxVotes = Math.max(...Object.values(voteCounts));
            const playersWithMaxVotes = Object.entries(voteCounts)
                .filter(([_, count]) => count === maxVotes)
                .map(([id, _]) => parseInt(id));

            if (playersWithMaxVotes.length > 1) {
                return; // Tie, nobody eliminated
            }

            const eliminatedId = playersWithMaxVotes[0];
            const eliminatedPlayer = state.players.find(p => p.id === eliminatedId);

            eliminatedPlayer.alive = false;
            eliminatedPlayer.eliminated = true;
        }

        function checkWinConditions() {
            const alivePlayers = state.players.filter(p => p.alive);
            const aliveImpostor = alivePlayers.find(p => p.role === 'Impostor');
            const aliveDetective = alivePlayers.find(p => p.role === 'Detective');
            const aliveCrewmates = alivePlayers.filter(p => p.role === 'Crewmate');

            // Impostor and Detective only
            if (aliveImpostor && aliveDetective && aliveCrewmates.length === 0) {
                state.gameLog.push('Impostor wins: All Crewmates eliminated!');
                return true;
            }

            // Only Impostor and Detective remain
            if (alivePlayers.length === 2 && aliveImpostor && aliveDetective) {
                state.gameLog.push('Impostor wins: Only Impostor and Detective remain!');
                return true;
            }

            // All Crewmates eliminated
            if (aliveCrewmates.length === 0 && aliveImpostor && aliveDetective) {
                state.gameLog.push('Impostor wins: All Crewmates eliminated!');
                return true;
            }

            // Impostor voted out
            if (!aliveImpostor && (aliveDetective || aliveCrewmates.length > 0)) {
                state.gameLog.push('Crewmates win: Impostor was voted out!');
                return true;
            }

            return false;
        }

        function nextRound() {
            const checkWin = checkWinConditions();
            if (checkWin) {
                state.phase = 'gameover';
                render();
                return;
            }

            state.roundNumber++;
            state.phase = 'discussion';
            state.currentPlayerIndex = 0;
            state.selectedVote = null;
            state.selectedElimination = null;
            state.votes = {};
            state.revealed = false;
            state.holdProgress = 0;

            render();
        }

        function resetGame() {
            state = {
                screen: 'setup',
                phase: 'setup',
                players: [],
                currentPlayerIndex: 0,
                holdProgress: 0,
                revealed: false,
                votingPhase: null,
                votes: {},
                selectedVote: null,
                selectedElimination: null,
                eliminationGesture: null,
                gameLog: [],
                roundNumber: 1
            };
            
            if (holdInterval) clearInterval(holdInterval);
            render();
        }

        // Initial render
        state.phase = 'setup';
        render();
    </script>
</body>
</html>
