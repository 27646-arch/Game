<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Whose Impostor?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            width: 100%;
            min-height: 100vh;
            background-color: #0a0e27;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0f3e 50%, #0f2e5e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 40px 20px;
            position: relative;
            overflow-y: auto;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%), 
                        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        h2 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #fff;
            text-align: center;
        }

        h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 12px 0;
        }

        .subtitle {
            font-size: 16px;
            color: #a0a0ff;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .card {
            background: rgba(30, 30, 80, 0.4);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #a0a0ff;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 20px;
            resize: none;
            box-sizing: border-box;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 12px;
            touch-action: manipulation;
        }

        /* Secondary style variant for the menu selection layout options */
        button.secondary-btn {
            background: linear-gradient(135deg, #3b426e 0%, #252a4a 100%);
            border: 1px solid rgba(99, 102, 241, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(99, 102, 241, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .phase-indicator {
            text-align: center;
            font-size: 13px;
            color: #a0a0ff;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .progress {
            font-size: 14px;
            color: #a0a0ff;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
        }

        .reveal-card {
            background: rgba(30, 30, 80, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 60px 40px;
            margin-bottom: 40px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .player-name {
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            color: #fff;
        }

        .hold-button {
            position: relative;
            padding: 16px 32px;
            background-color: rgba(99, 102, 241, 0.2);
            border: 2px solid rgba(99, 102, 241, 0.5);
            border-radius: 12px;
            color: #a0a0ff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            overflow: hidden;
            min-width: 150px;
            text-align: center;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .hold-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 10px;
        }

        .hold-text {
            position: relative;
            z-index: 1;
        }

        .role-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        .role-badge {
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .gesture-hint {
            font-size: 13px;
            color: #a0a0ff;
            font-style: italic;
            text-align: center;
        }

        .discussion-box {
            background: rgba(30, 30, 80, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 40px 24px;
            margin-bottom: 30px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
        }

        .discussion-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .discussion-text {
            font-size: 16px;
            color: #a0a0ff;
            line-height: 1.6;
        }

        .elimination-phase-box {
            background: rgba(30, 30, 80, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 40px 30px;
            margin-bottom: 40px;
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .elimination-phase-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .elimination-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 20px;
            touch-action: manipulation;
        }

        .player-select-btn {
            padding: 14px 16px;
            background-color: rgba(99, 102, 241, 0.2);
            border: 2px solid rgba(99, 102, 241, 0.5);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .player-select-btn.selected {
            background-color: #ff3d5c !important;
            border-color: #ff3d5c !important;
            color: #ffffff !important;
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(255, 61, 92, 0.6);
        }

        .voting-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #fff;
            text-align: center;
        }

        .voting-subtitle {
            font-size: 14px;
            color: #a0a0ff;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
        }

        .voting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
            width: 100%;
            touch-action: manipulation;
        }

        .vote-option {
            padding: 16px 12px;
            background-color: rgba(77, 127, 255, 0.2);
            border: 2px solid rgba(77, 127, 255, 0.5);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .vote-option.selected {
            background-color: #4d7fff !important;
            border-color: #4d7fff !important;
            color: #ffffff !important;
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(77, 127, 255, 0.6);
        }

        .voting-content, .results-content, .reveal-content, .discussion-content, .elimination-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
        }

        .results-title {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 30px 0;
            text-align: center;
            color: #fff;
        }

        .game-status {
            background: rgba(30, 30, 80, 0.3);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            width: 100%;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-item {
            font-size: 13px;
            padding: 8px;
            color: #a0a0ff;
            display: flex;
            justify-content: space-between;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 600px) {
            h1 { font-size: 36px; }
            h2 { font-size: 28px; }
            .reveal-card, .elimination-phase-box, .discussion-box { padding: 30px 16px; }
            .player-name { font-size: 28px; }
            .role-badge { font-size: 20px; padding: 16px 32px; }
            .card { padding: 20px; }
            .voting-grid, .elimination-grid { grid-template-columns: repeat(2, 1fr); }
            button { font-size: 15px; padding: 14px 16px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const GESTURES = ['Wink', 'Double Blink', 'Tap Shoulder', 'Wave Hand'];
        const roleColors = { Impostor: '#ff3d5c', Detective: '#4d7fff', Crewmate: '#2ecc71' };

        let state = {
            phase: 'setup',
            players: [],
            currentPlayerIndex: 0,
            alivePlayers: [], 
            holdProgress: 0,
            revealed: false,
            votes: {},
            selectedVote: null,
            selectedElimination: null,
            pendingElimination: null, 
            eliminationGesture: null,
            gameLog: [],
            roundNumber: 1,
            lastVotedOut: null,
            lastNightEliminated: null
        };

        let holdInterval = null;
        let isHolding = false;

        function generateRoles(numPlayers) {
            const roles = ['Impostor', 'Detective'];
            for (let i = 2; i < numPlayers; i++) roles.push('Crewmate');
            return roles.sort(() => Math.random() - 0.5);
        }

        function getAlivePlayers() {
            return state.players.filter(p => p.alive);
        }

        function getImpostor() {
            return state.players.find(p => p.role === 'Impostor');
        }

        function selectElimination(value) {
            console.log("Selected Elimination Target:", value);
            state.selectedElimination = value;
            render();
        }

        function selectVote(id) {
            state.selectedVote = id;
            render();
        }

        function render() {
            const app = document.getElementById('app');
            if (!app) return;
            
            switch(state.phase) {
                case 'setup': renderSetup(app); break;
                case 'reveal': renderReveal(app); break;
                case 'discussion': renderDiscussion(app); break;
                case 'elimination': renderElimination(app); break;
                case 'voting': renderVoting(app); break;
                case 'results': renderResults(app); break;
                case 'gameover': renderGameOver(app); break;
            }
        }

        function renderSetup(app) {
            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="content">
                        <h1>Whose Impostor?</h1>
                        <p class="subtitle">A game of deception and deduction</p>
                        <div class="card">
                            <label>Enter player names (one per line):</label>
                            <textarea id="playerNames" placeholder="Alice&#10;Bob&#10;Charlie&#10;Diana&#10;Eva"></textarea>
                            <button onclick="startGame(event)" ontouchstart="startGame(event)">Start Game</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderReveal(app) {
            const currentPlayer = state.players[state.currentPlayerIndex];
            const progress = Math.min(state.holdProgress / 1000, 1);

            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="reveal-content">
                        <div class="phase-indicator">ROLE REVEAL</div>
                        <div class="progress">${state.currentPlayerIndex + 1} / ${state.players.length}</div>
                        <div class="reveal-card">
                            <h2 class="player-name">${currentPlayer.name}</h2>
                            <div class="hold-button" id="holdBtn" 
                                 onmousedown="handleHoldStart(event)" onmouseup="handleHoldEnd(event)" 
                                 onmouseleave="handleHoldEnd(event)" ontouchstart="handleHoldStart(event)" 
                                 ontouchend="handleHoldEnd(event)" 
                                 style="opacity: ${state.revealed ? 0 : 1}; pointer-events: ${state.revealed ? 'none' : 'auto'};">
                                <div class="hold-progress" style="width: ${progress * 100}%"></div>
                                <span class="hold-text">Hold to Reveal</span>
                            </div>
                            ${state.revealed ? `
                                <div class="role-display">
                                    <div class="role-badge" style="background-color: ${roleColors[currentPlayer.role]};">${currentPlayer.role}</div>
                                    ${currentPlayer.role === 'Impostor' ? `<div class="gesture-hint">Gesture: <strong>${state.eliminationGesture}</strong></div>` : ''}
                                </div>
                            ` : ''}
                        </div>
                        ${state.revealed ? `<button onclick="nextPlayer(event)" ontouchstart="nextPlayer(event)">Hide Role & Next Player</button>` : ''}
                    </div>
                </div>
            `;
        }

        function renderDiscussion(app) {
            const alive = getAlivePlayers();
            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="discussion-content">
                        <div class="phase-indicator">DISCUSSION PHASE - ROUND ${state.roundNumber}</div>
                        <div class="discussion-box">
                            <h2 class="discussion-title">Discuss & Suspect</h2>
                            <p class="discussion-text">Talk with each other. Who is the Impostor?</p>
                        </div>
                        <div class="game-status">
                            <h3>Active Players (${alive.length})</h3>
                            <div class="player-list">${alive.map(p => `<div class="player-item">${p.name}</div>`).join('')}</div>
                        </div>
                        <button onclick="goToElimination(event)" ontouchstart="goToElimination(event)">Elimination Phase</button>
                    </div>
                </div>
            `;
        }

        function renderElimination(app) {
            const alive = getAlivePlayers();
            const imp = getImpostor();
            const selectable = alive.filter(p => p.id !== imp.id);

            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="elimination-content">
                        <div class="phase-indicator">ELIMINATION PHASE</div>
                        <div class="elimination-phase-box">
                            <div class="elimination-phase-title">Who Was Secretly Eliminated?</div>
                            <div class="elimination-grid">
                                ${selectable.map(p => {
                                    const isSel = state.selectedElimination === p.id;
                                    return `<button class="player-select-btn ${isSel ? 'selected' : ''}" 
                                                onclick="selectElimination(${p.id})" 
                                                ontouchstart="event.stopPropagation(); selectElimination(${p.id});">
                                                ${p.name}
                                            </button>`;
                                }).join('')}
                                <button class="player-select-btn ${state.selectedElimination === 'none' ? 'selected' : ''}" 
                                    onclick="selectElimination('none')" 
                                    ontouchstart="event.stopPropagation(); selectElimination('none');">
                                    Skip Elimination
                                </button>
                            </div>
                        </div>
                        <button onclick="confirmElimination(event)" ontouchstart="confirmElimination(event)" ${state.selectedElimination === null ? 'disabled' : ''}>
                            Confirm & Go to Voting
                        </button>
                    </div>
                </div>
            `;
        }

        function confirmElimination(e) {
            if (e && e.cancelable) e.preventDefault();
            if (state.selectedElimination === null) return;

            state.alivePlayers = getAlivePlayers();
            state.pendingElimination = state.selectedElimination;

            state.currentPlayerIndex = 0;
            state.selectedVote = null;
            state.votes = {};
            state.phase = 'voting';

            console.log("Voting roster locked for current round:", state.alivePlayers.map(p => p.name));
            render();
        }

        function renderVoting(app) {
            const currentVoter = state.alivePlayers[state.currentPlayerIndex];
            const selectableOptions = getAlivePlayers().filter(p => p.id !== currentVoter.id);

            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="voting-content">
                        <div class="phase-indicator">VOTING PHASE - ROUND ${state.roundNumber}</div>
                        <h2 class="voting-title">Cast Your Vote</h2>
                        <p class="voting-subtitle">Pass phone to: <strong>${currentVoter.name}</strong></p>
                        <div class="voting-grid">
                            ${selectableOptions.map(p => {
                                const isSel = state.selectedVote === p.id;
                                return `<button class="vote-option ${isSel ? 'selected' : ''}" 
                                            onclick="selectVote(${p.id})" 
                                            ontouchstart="event.stopPropagation(); selectVote(${p.id});">
                                            ${p.name}
                                        </button>`;
                            }).join('')}
                        </div>
                        <button onclick="submitVote(event)" ontouchstart="submitVote(event)" ${state.selectedVote === null ? 'disabled' : ''}>
                            Submit Vote
                        </button>
                    </div>
                </div>
            `;
        }

        function submitVote(e) {
            if (e && e.cancelable) e.preventDefault();
            if (state.selectedVote === null) return;

            const currentVoter = state.alivePlayers[state.currentPlayerIndex];
            state.votes[currentVoter.id] = state.selectedVote;

            if (state.currentPlayerIndex < state.alivePlayers.length - 1) {
                state.currentPlayerIndex++;
                state.selectedVote = null;
                render();
            } else {
                processEliminationsAndVotes();
                
                if (checkWinConditions()) {
                    state.phase = 'gameover';
                } else {
                    state.phase = 'results';
                }
                render();
            }
        }

        function processEliminationsAndVotes() {
            state.lastNightEliminated = null;
            if (state.pendingElimination && state.pendingElimination !== 'none') {
                const targetedPlayer = state.players.find(p => p.id === state.pendingElimination);
                if (targetedPlayer && targetedPlayer.alive) {
                    targetedPlayer.alive = false;
                    state.lastNightEliminated = targetedPlayer.name;
                    if (targetedPlayer.role === 'Detective') {
                        state.gameLog.push('Crewmates win: Detective was eliminated by Impostor!');
                    }
                }
            }

            const voteCounts = {};
            const activePool = getAlivePlayers(); 
            
            activePool.forEach(p => { voteCounts[p.id] = 0; });

            Object.values(state.votes).forEach(votedId => {
                if (voteCounts[votedId] !== undefined) {
                    voteCounts[votedId]++;
                }
            });

            const voteValues = Object.values(voteCounts);
            const maxVotes = voteValues.length > 0 ? Math.max(...voteValues) : 0;

            if (maxVotes === 0) {
                state.lastVotedOut = "tie";
                return;
            }

            const highestVotedIds = Object.entries(voteCounts)
                .filter(([_, count]) => count === maxVotes)
                .map(([id, _]) => parseInt(id));

            if (highestVotedIds.length > 1) {
                state.lastVotedOut = "tie";
            } else {
                const targetId = highestVotedIds[0];
                const targetPlayer = state.players.find(p => p.id === targetId);
                if (targetPlayer && targetPlayer.alive) {
                    targetPlayer.alive = false;
                    state.lastVotedOut = targetPlayer.name;
                } else {
                    state.lastVotedOut = "tie"; 
                }
            }
        }

        function renderResults(app) {
            let nightReport = state.lastNightEliminated 
                ? `During the night, <strong>${state.lastNightEliminated}</strong> was secretly eliminated.` 
                : "No one was eliminated during the night phase.";

            let voteReport = state.lastVotedOut === 'tie'
                ? "The day vote resulted in a <strong>tie</strong>! No one was cast out."
                : `The group voted to cast out <strong>${state.lastVotedOut}</strong>.`;

            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="results-content">
                        <h2 class="results-title">Round Summary</h2>
                        <div class="card" style="width: 100%; display: flex; flex-direction: column; gap: 15px;">
                            <p class="discussion-text">${nightReport}</p>
                            <hr style="border: 0; border-top: 1px solid rgba(99, 102, 241, 0.3);">
                            <p class="discussion-text">${voteReport}</p>
                        </div>
                        <button onclick="nextRound(event)" ontouchstart="nextRound(event)">Continue</button>
                    </div>
                </div>
            `;
        }

        function checkWinConditions() {
            const alive = getAlivePlayers();
            const imp = alive.find(p => p.role === 'Impostor');
            const det = alive.find(p => p.role === 'Detective');
            const crew = alive.filter(p => p.role === 'Crewmate');

            if (state.gameLog.some(log => log.includes('Detective was eliminated'))) return true;

            if (!imp) {
                state.gameLog.push('Crewmates win: The Impostor was successfully voted out!');
                return true;
            }
            if (alive.length === 2 && imp && det) {
                state.gameLog.push('Impostor wins: Only the Impostor and Detective remain!');
                return true;
            }
            if (crew.length === 0 && imp) {
                state.gameLog.push('Impostor wins: All Crewmates have been eliminated!');
                return true;
            }
            return false;
        }

        /* UPDATED: Displays stacked Primary (Same Players) and Secondary (New Players) action hooks */
        function renderGameOver(app) {
            const victoryDeclaration = state.gameLog[state.gameLog.length - 1] || "Game Over";
            app.innerHTML = `
                <div class="container">
                    <div class="background"></div>
                    <div class="results-content">
                        <h2>Game Over</h2>
                        <div class="card" style="width: 100%; text-align: center; border-color: #ff3d5c;">
                            <p class="discussion-text">${victoryDeclaration}</p>
                        </div>
                        
                        <button onclick="playAgainSamePlayers(event)" ontouchstart="playAgainSamePlayers(event)">
                            Play Again (Same Players)
                        </button>
                        
                        <button class="secondary-btn" onclick="resetToMainMenu(event)" ontouchstart="resetToMainMenu(event)">
                            New Players
                        </button>
                    </div>
                </div>
            `;
        }

        function startGame(e) {
            if (e && e.cancelable) e.preventDefault();
            const textarea = document.getElementById('playerNames');
            if (!textarea) return;

            const names = textarea.value.split('\n').map(n => n.trim()).filter(n => n.length > 0);
            if (names.length < 3) { alert('Requires at least 3 players.'); return; }
            if (new Set(names).size !== names.length) { alert('Names must be completely unique.'); return; }

            state.eliminationGesture = GESTURES[Math.floor(Math.random() * GESTURES.length)];
            const roles = generateRoles(names.length);
            
            state.players = names.map((name, i) => ({
                id: i,
                name: name,
                role: roles[i],
                alive: true
            }));

            state.phase = 'reveal';
            state.currentPlayerIndex = 0;
            render();
        }

        /* NEW FEATURE UTILITY: Retains current participant parameters, reshuffles profiles, starts role reveal */
        function playAgainSamePlayers(e) {
            if (e && e.cancelable) e.preventDefault();
            if (state.players.length === 0) return;

            console.log("=== EXECUTING: Play Again (Same Players) ===");
            
            // Extract existing player names safely
            const currentNames = state.players.map(p => p.name);
            
            // Generate entirely new shuffled roles and elimination gesture context parameters
            const freshRoles = generateRoles(currentNames.length);
            state.eliminationGesture = GESTURES[Math.floor(Math.random() * GESTURES.length)];

            // Reset the base player structures array
            state.players = currentNames.map((name, i) => ({
                id: i,
                name: name,
                role: freshRoles[i],
                alive: true
            }));

            // Complete reset of game environmental logs, variables, and tracking matrices
            state.currentPlayerIndex = 0;
            state.alivePlayers = [];
            state.holdProgress = 0;
            state.revealed = false;
            state.votes = {};
            state.selectedVote = null;
            state.selectedElimination = null;
            state.pendingElimination = null;
            state.gameLog = [];
            state.roundNumber = 1;
            state.lastVotedOut = null;
            state.lastNightEliminated = null;

            if (holdInterval) { clearInterval(holdInterval); holdInterval = null; }
            isHolding = false;

            // Route execution flow directly into the role card distribution cycle screen
            state.phase = 'reveal';
            render();
        }

        /* NEW FEATURE UTILITY: Completely purges engine profile logs to allow a fresh start layout initialization */
        function resetToMainMenu(e) {
            if (e && e.cancelable) e.preventDefault();
            console.log("=== EXECUTING: New Players (Full Reset) ===");
            
            state = { 
                phase: 'setup', 
                players: [], 
                currentPlayerIndex: 0, 
                alivePlayers: [], 
                holdProgress: 0, 
                revealed: false, 
                votes: {}, 
                selectedVote: null, 
                selectedElimination: null, 
                pendingElimination: null, 
                eliminationGesture: null, 
                gameLog: [], 
                roundNumber: 1, 
                lastVotedOut: null, 
                lastNightEliminated: null 
            };

            if (holdInterval) { clearInterval(holdInterval); holdInterval = null; }
            isHolding = false;
            
            render();
        }

        function nextPlayer(e) {
            if (e && e.cancelable) e.preventDefault();
            if (state.currentPlayerIndex < state.players.length - 1) {
                state.currentPlayerIndex++;
                state.revealed = false;
                state.holdProgress = 0;
                render();
            } else {
                state.phase = 'discussion';
                render();
            }
        }

        function goToElimination(e) { 
            if (e && e.cancelable) e.preventDefault();
            state.phase = 'elimination'; 
            state.selectedElimination = null; 
            render(); 
        }

        function handleHoldStart(e) {
            if (e && e.cancelable) e.preventDefault();
            if (state.revealed || isHolding) return;
            isHolding = true;
            holdInterval = setInterval(() => {
                state.holdProgress += 20;
                if (state.holdProgress >= 1000) {
                    state.revealed = true;
                    clearInterval(holdInterval);
                    isHolding = false;
                    render();
                } else {
                    const progress = document.querySelector('.hold-progress');
                    if (progress) progress.style.width = (state.holdProgress / 10) + '%';
                }
            }, 20);
        }

        function handleHoldEnd(e) {
            if (e && e.cancelable) e.preventDefault();
            isHolding = false;
            if (holdInterval) { clearInterval(holdInterval); holdInterval = null; }
            if (!state.revealed) {
                state.holdProgress = 0;
                const progress = document.querySelector('.hold-progress');
                if (progress) progress.style.width = '0%';
            }
        }

        function nextRound(e) {
            if (e && e.cancelable) e.preventDefault();
            state.roundNumber++;
            state.phase = 'discussion';
            state.currentPlayerIndex = 0;
            state.selectedVote = null;
            state.selectedElimination = null;
            state.pendingElimination = null;
            state.votes = {};
            state.revealed = false;
            state.holdProgress = 0;
            render();
        }

        render();
    </script>
</body>
</html>
