<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whose Impostor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --bg: #0a0a1f;
            --accent: #ff2a6d;
            --crew: #05d9e8;
            --impostor: #d9138a;
            --detective: #f4a261;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Press Start 2P', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        header {
            background: #111;
            padding: 1.2rem 1rem;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }
        
        h1 { 
            font-size: clamp(1.4rem, 5vw, 2rem); 
            text-shadow: 0 0 10px var(--accent);
            letter-spacing: 2px;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            width: 100%;
            max-width: 100%;
            overflow-y: auto;
        }
        
        .screen { 
            display: none; 
            width: 100%; 
            flex-direction: column; 
            align-items: center; 
            gap: 1.2rem; 
            flex: 1;
        }
        .screen.active { display: flex; }
        
        input, button {
            font-family: 'Press Start 2P', system-ui, sans-serif;
            padding: 0.9rem 1.2rem;
            margin: 0.5rem 0;
            border: 4px solid #fff;
            background: #111;
            color: #fff;
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            text-transform: uppercase;
            width: 100%;
            max-width: 100%;
        }
        
        input {
            max-width: 420px;
        }
        
        button {
            cursor: pointer;
            transition: all 0.15s;
            min-height: 52px;
        }
        
        button:hover, button:active { 
            background: var(--accent); 
            transform: scale(1.03); 
        }
        
        button.danger { 
            border-color: var(--impostor); 
        }
        
        .player-list {
            width: 100%;
            max-height: 45vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding: 0.5rem;
        }
        
        .player-item {
            background: #111;
            padding: 1rem;
            border: 3px solid var(--crew);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: clamp(1rem, 4vw, 1.2rem);
            min-height: 60px;
        }
        
        .remove-btn {
            background: #300;
            border: 2px solid #f66;
            padding: 0.4rem 0.8rem;
            font-size: clamp(0.8rem, 3vw, 1rem);
            min-width: 40px;
        }
        
        .role-card {
            width: 100%;
            max-width: 420px;
            height: clamp(280px, 55vh, 380px);
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 8px solid #fff;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 42, 109, 0.6);
            margin: 0.5rem 0;
        }
        
        .role-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: scan 3s linear infinite;
        }
        
        @keyframes scan { 
            0% { transform: translateY(-100%); } 
            100% { transform: translateY(100%); } 
        }
        
        .card-header { 
            font-size: clamp(1rem, 4vw, 1.3rem); 
            margin-bottom: 1rem; 
            color: #aaa; 
            letter-spacing: 1px;
        }
        
        .role-name {
            font-size: clamp(1.8rem, 8vw, 2.6rem);
            font-weight: bold;
            margin: 1rem 0;
            text-transform: uppercase;
            text-shadow: 0 0 20px currentColor;
        }
        
        .impostor .role-name { color: var(--impostor); }
        .detective .role-name { color: var(--detective); }
        .crewmate .role-name { color: var(--crew); }
        
        .hold-btn {
            background: #222;
            border: 6px solid #fff;
            padding: 1.2rem 2.5rem;
            font-size: clamp(1.1rem, 4.5vw, 1.4rem);
            margin-top: 1.5rem;
            user-select: none;
            touch-action: none;
            min-height: 70px;
        }
        
        .voting-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            width: 100%;
            padding: 0 0.5rem;
        }
        
        .vote-option {
            background: #111;
            border: 4px solid #555;
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: clamp(1rem, 3.8vw, 1.2rem);
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .vote-option.selected {
            border-color: var(--accent);
            background: #222;
            transform: scale(1.05);
        }
        
        #game-phase, #alive-count {
            font-size: clamp(1rem, 4vw, 1.3rem);
        }
        
        .status {
            text-align: center;
            padding: 1.2rem;
            background: #111;
            border: 3px solid var(--accent);
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header><h1>WHOSE IMPOSTOR</h1></header>
    
    <div class="container">
        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="screen active">
            <h2 style="color: var(--accent); margin-bottom: 1rem; font-size: clamp(1.2rem, 5vw, 1.6rem);">ENTER PLAYERS</h2>
            
            <div style="width: 100%; max-width: 460px;">
                <input type="text" id="player-name" placeholder="PLAYER NAME" maxlength="20" onkeypress="if(event.key === 'Enter') addPlayer()">
                <button onclick="addPlayer()">ADD PLAYER</button>
            </div>
            
            <div class="player-list" id="player-list"></div>
            
            <div style="margin-top: auto; padding-top: 1.5rem; width: 100%; max-width: 460px;">
                <button onclick="startGame()" id="start-btn" style="background: var(--accent); font-size: clamp(1.1rem, 4.5vw, 1.4rem);">START GAME</button>
                <p id="setup-status" style="margin-top: 1rem; font-size: clamp(0.8rem, 3vw, 0.95rem); color: #888; text-align: center;"></p>
            </div>
        </div>

        <!-- ROLE REVEAL SCREEN -->
        <div id="role-screen" class="screen">
            <div class="role-card" id="role-card">
                <div class="card-header" id="player-name-display">PLAYER</div>
                
                <div id="hold-area" style="width: 100%; text-align: center;">
                    <div id="hold-instruction" style="text-align: center; line-height: 1.5; margin-bottom: 1rem;">
                        HOLD TO REVEAL<br>
                        <span style="font-size: clamp(0.75rem, 3vw, 0.9rem);">1 SECOND</span>
                    </div>
                    <button class="hold-btn" id="reveal-btn"
                            onmousedown="startHold()" 
                            ontouchstart="startHold(event)"
                            onmouseup="cancelHold()" 
                            ontouchend="cancelHold()"
                            onmouseleave="cancelHold()">HOLD</button>
                </div>
                
                <div id="role-reveal" style="display: none; text-align: center; width: 100%; padding: 0 1.5rem;">
                    <div class="role-name" id="revealed-role"></div>
                    <div id="role-desc" style="margin: 1.2rem 0; font-size: clamp(0.9rem, 3.5vw, 1.05rem); line-height: 1.5; min-height: 80px;"></div>
                    <button onclick="hideRoleAndNext()" style="width: auto; max-width: 320px;">HIDE ROLE &amp; NEXT</button>
                </div>
            </div>
            
            <div style="margin-top: 1rem; font-size: clamp(0.8rem, 3vw, 0.95rem); color: #666;" id="reveal-counter"></div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="screen">
            <div class="status">
                <h3 id="game-phase">DISCUSSION PHASE</h3>
                <p id="alive-count"></p>
            </div>
            
            <div style="display: flex; gap: 1rem; width: 100%; max-width: 460px;">
                <button onclick="enterVoting()" style="flex: 1;">START VOTING</button>
                <button onclick="eliminatePlayerPrompt()" class="danger" style="flex: 1;">ELIMINATE</button>
            </div>
            
            <div style="width: 100%; max-width: 460px;">
                <h3 style="margin: 1.2rem 0 0.8rem; text-align: center; font-size: clamp(1rem, 4vw, 1.2rem);">ALIVE PLAYERS</h3>
                <div class="player-list" id="alive-list"></div>
            </div>
            
            <button onclick="endGame()" class="danger" style="margin-top: 2rem;">END GAME</button>
        </div>

        <!-- VOTING SCREEN -->
        <div id="voting-screen" class="screen">
            <h2 style="font-size: clamp(1.3rem, 5.5vw, 1.8rem);">VOTING PHASE</h2>
            <p style="margin-bottom: 1.5rem; text-align: center; font-size: clamp(0.95rem, 3.8vw, 1.1rem);">Who is the Impostor?</p>
            <div class="voting-grid" id="voting-grid"></div>
            <button onclick="submitVote()" id="submit-vote-btn" style="display: none; margin-top: 2rem; background: var(--accent);">LOCK IN VOTE</button>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="screen">
            <h2 id="results-title" style="font-size: clamp(1.3rem, 5vw, 1.8rem);">VOTE RESULTS</h2>
            <div id="vote-results" style="width: 100%; max-width: 500px;"></div>
            <button onclick="continueAfterVote()" style="margin-top: 2.5rem;">CONTINUE</button>
        </div>

        <!-- WIN SCREEN -->
        <div id="win-screen" class="screen">
            <div id="win-message" style="text-align: center; font-size: clamp(1.8rem, 7vw, 2.6rem); line-height: 1.3; margin: 2rem 0; padding: 0 1rem;"></div>
            <button onclick="restartGame()" style="padding: 1.4rem 3.5rem; font-size: clamp(1.1rem, 4.5vw, 1.4rem);">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        let players = [];
        let gamePlayers = [];
        let currentRevealIndex = 0;
        let holdTimer = null;
        let alivePlayers = [];
        let selectedVoteIndex = -1;

        const screens = {
            setup: document.getElementById('setup-screen'),
            role: document.getElementById('role-screen'),
            game: document.getElementById('game-screen'),
            voting: document.getElementById('voting-screen'),
            results: document.getElementById('results-screen'),
            win: document.getElementById('win-screen')
        };

        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
        }

        function addPlayer() {
            const input = document.getElementById('player-name');
            const name = input.value.trim();
            
            if (!name) {
                alert("Enter a player name");
                return;
            }
            if (players.filter(p => p === name).length >= 2) {
                alert("Name can be used at most twice");
                return;
            }
            
            players.push(name);
            input.value = '';
            renderPlayerList();
            updateStartButton();
        }

        function removePlayer(i) {
            players.splice(i, 1);
            renderPlayerList();
            updateStartButton();
        }

        function renderPlayerList() {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            players.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = 'player-item';
                div.innerHTML = `<span>\( {name}</span><button class="remove-btn" onclick="removePlayer( \){i})">×</button>`;
                list.appendChild(div);
            });
        }

        function updateStartButton() {
            const btn = document.getElementById('start-btn');
            const status = document.getElementById('setup-status');
            if (players.length < 3) {
                btn.style.opacity = '0.6';
                status.textContent = `Need at least 3 players (${players.length}/3)`;
            } else {
                btn.style.opacity = '1';
                status.textContent = `${players.length} players ready`;
            }
        }

        function startGame() {
            if (players.length < 3) return alert("Need at least 3 players!");

            gamePlayers = players.map(name => ({name, role: "Crewmate", alive: true}));
            
            // Shuffle and assign roles
            let indices = [...Array(gamePlayers.length).keys()];
            for (let i = indices.length-1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i+1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            
            gamePlayers[indices[0]].role = "Impostor";
            if (gamePlayers.length > 1) gamePlayers[indices[1]].role = "Detective";
            
            alivePlayers = [...gamePlayers];
            currentRevealIndex = 0;
            
            showScreen('role');
            showNextRole();
        }

        function showNextRole() {
            if (currentRevealIndex >= gamePlayers.length) {
                showScreen('game');
                updateAliveList();
                return;
            }
            
            const p = gamePlayers[currentRevealIndex];
            document.getElementById('player-name-display').textContent = p.name.toUpperCase();
            document.getElementById('hold-area').style.display = 'block';
            document.getElementById('role-reveal').style.display = 'none';
            document.getElementById('reveal-counter').textContent = `Player ${currentRevealIndex+1} / ${gamePlayers.length}`;
        }

        function startHold(e) {
            if (e) e.preventDefault();
            holdTimer = setTimeout(revealRole, 1000);
        }

        function cancelHold() {
            if (holdTimer) {
                clearTimeout(holdTimer);
                holdTimer = null;
            }
        }

        function revealRole() {
            cancelHold();
            const p = gamePlayers[currentRevealIndex];
            const card = document.getElementById('role-card');
            card.className = `role-card ${p.role.toLowerCase()}`;
            
            document.getElementById('revealed-role').textContent = p.role.toUpperCase();
            const descEl = document.getElementById('role-desc');
            if (p.role === 'Impostor') {
                descEl.innerHTML = 'Use the secret gesture to eliminate Crewmates.<br><strong>Do NOT eliminate the Detective!</strong>';
            } else if (p.role === 'Detective') {
                descEl.textContent = 'Your identity must remain secret.';
            } else {
                descEl.textContent = 'Observe and vote out the Impostor!';
            }
            
            document.getElementById('hold-area').style.display = 'none';
            document.getElementById('role-reveal').style.display = 'block';
        }

        function hideRoleAndNext() {
            currentRevealIndex++;
            showNextRole();
        }

        function updateAliveList() {
            const list = document.getElementById('alive-list');
            list.innerHTML = '';
            const alive = alivePlayers.filter(p => p.alive);
            alive.forEach(p => {
                const div = document.createElement('div');
                div.className = 'player-item';
                div.innerHTML = `\( {p.name} <span style="font-size:0.8rem">( \){p.role})</span>`;
                list.appendChild(div);
            });
            document.getElementById('alive-count').textContent = `${alive.length} alive`;
        }

        function eliminatePlayerPrompt() {
            const name = prompt("Who do you want to eliminate? (type name)").trim();
            if (!name) return;
            
            const targetIndex = alivePlayers.findIndex(p => p.alive && p.name.toLowerCase() === name.toLowerCase());
            if (targetIndex === -1) return alert("Player not found");
            
            const target = alivePlayers[targetIndex];
            target.alive = false;
            
            if (target.role === "Detective") {
                alert("You eliminated the Detective! Impostor loses.");
                endGameWithWin("Crewmates");
                return;
            }
            if (target.role === "Impostor") {
                alert("The Impostor has been eliminated! Crewmates win!");
                endGameWithWin("Crewmates");
                return;
            }
            
            alert(`${target.name} was eliminated.`);
            updateAliveList();
            
            if (alivePlayers.filter(p => p.alive && p.role !== "Impostor").length <= 1) {
                endGameWithWin("Impostor");
            }
        }

        function enterVoting() {
            selectedVoteIndex = -1;
            showScreen('voting');
            renderVotingOptions();
        }

        function renderVotingOptions() {
            const grid = document.getElementById('voting-grid');
            grid.innerHTML = '';
            const living = alivePlayers.filter(p => p.alive);
            living.forEach((player, i) => {
                const div = document.createElement('div');
                div.className = 'vote-option';
                div.textContent = player.name;
                div.onclick = () => {
                    document.querySelectorAll('.vote-option').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedVoteIndex = i;
                    document.getElementById('submit-vote-btn').style.display = 'block';
                };
                grid.appendChild(div);
            });
        }

        function submitVote() {
            if (selectedVoteIndex === -1) return;
            showVoteResults();
        }

        function showVoteResults() {
            showScreen('results');
            const container = document.getElementById('vote-results');
            container.innerHTML = '<h3 style="margin:1rem 0">Vote Tally:</h3>';
            
            const living = alivePlayers.filter(p => p.alive);
            if (living.length > 0) {
                const eliminated = living[Math.floor(Math.random() * living.length)];
                eliminated.alive = false;
                
                const msg = document.createElement('div');
                msg.style.margin = '2rem 0';
                msg.style.fontSize = 'clamp(1.2rem, 5vw, 1.6rem)';
                msg.style.color = 'var(--accent)';
                msg.textContent = `${eliminated.name} WAS ELIMINATED`;
                container.appendChild(msg);
                
                if (eliminated.role === "Impostor") endGameWithWin("Crewmates");
                else if (eliminated.role === "Detective") endGameWithWin("Impostor");
                else updateAliveList();
            }
        }

        function continueAfterVote() {
            updateAliveList();
            showScreen('game');
        }

        function endGameWithWin(winner) {
            showScreen('win');
            const msg = document.getElementById('win-message');
            if (winner === "Crewmates") {
                msg.innerHTML = `CREWMATES WIN!`;
                msg.style.color = 'var(--crew)';
            } else {
                msg.innerHTML = `IMPOSTOR WINS!`;
                msg.style.color = 'var(--impostor)';
            }
        }

        function endGame() {
            if (confirm("End current game?")) restartGame();
        }

        function restartGame() {
            players = [];
            renderPlayerList();
            updateStartButton();
            showScreen('setup');
        }

        // Global exposure
        window.addPlayer = addPlayer;
        window.removePlayer = removePlayer;
        window.startGame = startGame;
        window.startHold = startHold;
        window.cancelHold = cancelHold;
        window.hideRoleAndNext = hideRoleAndNext;
        window.eliminatePlayerPrompt = eliminatePlayerPrompt;
        window.enterVoting = enterVoting;
        window.submitVote = submitVote;
        window.continueAfterVote = continueAfterVote;
        window.endGame = endGame;
        window.restartGame = restartGame;

        // Init
        updateStartButton();
    </script>
</body>
</html>
